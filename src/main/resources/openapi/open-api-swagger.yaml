openapi: 3.0.3
info:
  title: Api Server
  version: 1.0.0
  description: API Server

paths:
  /notifications:
    get:
      tags: [Notifications]
      summary: Get all notifications
      operationId: findAllNotifications
      responses:
        '200':
          description: A list of notifications
          content:
            application/json:
              schema: {type: array, items: {$ref: '#/components/schemas/NotificationResponse'}}

components:
  schemas:
    NotificationResponse:
      type: object
      description: DTO for Notification response
      required: [id, message, readStatus]
      properties:
        id: {type: string, example: "60d5ec49f1b2c8671cc8a3f1"}
        message: {type: string, example: "You have a new alert"}
        readStatus: {type: boolean, example: false}

# - Use inline arrays for required fields and tags: `required: [field1, field2]`
# - Use inline objects for simple properties: `propertyName: {type: string, format: int64, nullable: true}`
# - Use inline objects for nested single-item schemas: `schema: {type: array, items: {$ref: '...'}}`

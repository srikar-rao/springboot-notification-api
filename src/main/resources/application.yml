spring:
  application:
    name: springboot-prod-template

  # Virtual threads (Java 21+)
  threads:
    virtual:
      enabled: true

  # ===== MONGODB CONFIGURATION =====
  data:
    mongodb:
      uri: mongodb://localhost:27017/notifications

  # ===== JACKSON CONFIGURATION =====
  jackson:
    time-zone: UTC
    serialization:
      write-dates-as-timestamps: false

# ===== SERVER CONFIGURATION =====
server:
  port: 8080
  servlet:
    context-path: /api

# ===== MANAGEMENT/ACTUATOR CONFIGURATION =====
management:
  server:
    port: 8080
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5,0.95,0.99
    enable:
      http: true
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0
  # Uncomment for distributed tracing
  # zipkin:
  #   tracing:
  #     endpoint: http://localhost:9411/api/v2/spans

# ===== OPENAPI/SWAGGER CONFIGURATION =====
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /docs
    enabled: true
  info:
    title: Spring Boot Production Template API
    description: A production-ready Spring Boot application template with best practices
    version: '@project.version@'
    contact:
      name: API Support
      email: support@example.com

# ===== APPLICATION-SPECIFIC CONFIGURATION =====
app:
  cors:
    allowed-origins: "*"

# ===== LOGGING CONFIGURATION (Base Settings) =====
# Profile-specific logging levels defined in application-{profile}.yml
# Logback config in logback-spring.xml handles appenders and formats
logging:
  level:
    root: WARN
